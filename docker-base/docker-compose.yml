services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - gateway
    networks:
      - heritage-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - VITE_GRAPHQL_URL=/graphql
    networks:
      - heritage-net
    depends_on:
      - gateway

  gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    environment:
      - PORT=4000
      - AUTH_SERVICE_URL=http://service-auth:4001/graphql
      - TREE_SERVICE_URL=http://service-tree:4002/graphql
      - RECORDS_SERVICE_URL=http://service-records:4003/graphql
      - MEDIA_SERVICE_URL=http://service-media:4004/graphql
      - MATCHING_SERVICE_URL=http://service-matching:4005/graphql
      - JWT_SECRET=${JWT_SECRET:-heritage_jwt_secret}
    networks:
      - heritage-net
    depends_on:
      - service-auth
      - service-tree
      - service-records
      - service-media
      - service-matching

  service-auth:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: services/service-auth
    environment:
      - PORT=4001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=heritage
      - POSTGRES_USER=heritage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-heritage_pass}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-heritage_jwt_secret}
      - JWT_EXPIRES_IN=7d
    networks:
      - heritage-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-tree:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: services/service-tree
    environment:
      - PORT=4002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=heritage
      - POSTGRES_USER=heritage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-heritage_pass}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_pass}
    networks:
      - heritage-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  service-records:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: services/service-records
    environment:
      - PORT=4003
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - heritage-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  service-media:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: services/service-media
    environment:
      - PORT=4004
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heritage_access}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heritage_secret}
      - MINIO_BUCKET=heritage-media
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=heritage
      - POSTGRES_USER=heritage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-heritage_pass}
    networks:
      - heritage-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  service-matching:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: services/service-matching
    environment:
      - PORT=4005
      - REDIS_URL=redis://redis:6379
      - TREE_SERVICE_URL=http://service-tree:4002/graphql
      - RECORDS_SERVICE_URL=http://service-records:4003/graphql
    networks:
      - heritage-net
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=heritage
      - POSTGRES_USER=heritage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-heritage_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - heritage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heritage"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-neo4j_pass}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - heritage-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - heritage-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - heritage-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-heritage_access}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-heritage_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - heritage-net

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  heritage-net:
    driver: bridge

